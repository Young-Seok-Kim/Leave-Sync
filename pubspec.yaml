name: leavesync
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1  # 버전을 현실적으로 조정 (3.x는 아직 unstable함)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_sign_in: ^6.2.1
  # 3.7.0 미만 SDK에서도 돌아가도록 버전을 살짝 내렸습니다.
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  # SDK 내부의 flutter_localizations와 충돌 안 나게 고정
  intl: ^0.19.0
  # 👈 실행 시 No implementation found 에러 방지를 위해 위로 이동
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png" # 👈 본인의 실제 이미지 경로
  # 안드로이드 8.0 이상 적응형 아이콘 설정 (둥근 아이콘 대응)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"